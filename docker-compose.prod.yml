version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - REACT_APP_API_URL=https://${DOMAIN}/api
    networks:
      - app-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=5000
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/domain.conf.template:/etc/nginx/templates/domain.conf.template:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./var/www/certbot:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    command: >
      sh -c "envsubst '${DOMAIN}' < /etc/nginx/templates/domain.conf.template > /etc/nginx/conf.d/default.conf
               && nginx -g 'daemon off;'"
    depends_on:
      - client
      - server
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./var/www/certbot:/var/www/certbot
    command: >
      sh -c "while :; do
        echo 'Certbot is waiting for manual execution...'
        sleep 3600
      done"
    profiles:
      - ssl

networks:
  app-network:
    driver: bridge

volumes:
  ssl:
  certbot-logs:
