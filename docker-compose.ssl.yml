version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/domain.conf.template:/etc/nginx/templates/domain.conf.template:ro
      - ./nginx/templates/ssl-fallback.conf.template:/etc/nginx/templates/ssl-fallback.conf.template:ro
      - ${CERTBOT_PATH:-./ssl}:/etc/letsencrypt:ro
      - ./var/www/certbot:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    command: >
      sh -c "
      if [ -f /etc/letsencrypt/live/$DOMAIN/fullchain.pem ]; then
        echo 'SSL certificates found, using HTTPS configuration';
        envsubst '$$DOMAIN' < /etc/nginx/templates/domain.conf.template > /etc/nginx/conf.d/default.conf;
      else
        echo 'No SSL certificates found, using HTTP only';
        envsubst '$$DOMAIN' < /etc/nginx/templates/ssl-fallback.conf.template > /etc/nginx/conf.d/default.conf;
      fi;
      nginx -g 'daemon off;'
      "
    depends_on:
      - client
      - server
    networks:
      - app-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - REACT_APP_API_URL=${SSL_CERTS:-http://$DOMAIN}/api
    networks:
      - app-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=5000
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ${CERTBOT_PATH}:/etc/letsencrypt
      - ./var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
